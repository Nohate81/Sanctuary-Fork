# The Sanctuary - Production override
# Stricter limits and logging
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  sanctuary:
    restart: always
    environment:
      - DEVELOPMENT_MODE=false
      - LOG_LEVEL=INFO
      - SANCTUARY_RESTORE_LATEST=true
      - SANCTUARY_AUTO_SAVE_INTERVAL=300
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  chromadb:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  searxng:
    restart: always
